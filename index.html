<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>MentiAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;padding:8px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #222}
.hdr h1{font-size:16px;font-weight:700;color:#38bdf8}
.tg{display:flex;align-items:center;gap:6px;font-size:12px;color:#888}
.t{width:36px;height:20px;background:#333;border-radius:10px;cursor:pointer;position:relative;transition:background .15s}
.t.on{background:#38bdf8}
.t::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .15s}
.t.on::after{transform:translateX(16px)}
.sb{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#111;border-radius:6px;margin:8px 0;font-size:11px}
.sd{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}
.sd.on{background:#22c55e;box-shadow:0 0 6px #22c55e}
.sd.off{background:#ef4444}
.sd.w{background:#eab308;animation:p 1s infinite}
@keyframes p{50%{opacity:.4}}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin:8px 0}
.b1{background:#38bdf8;color:#0a0a0a}
.b2{background:#22c55e;color:#fff}
.b2:disabled{background:#333;color:#666}
.er{padding:8px;background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:6px;color:#ef4444;font-size:12px;margin:8px 0;display:none}
.ld{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px;color:#38bdf8;font-size:13px}
.sp{width:16px;height:16px;border:2px solid #333;border-top-color:#38bdf8;border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pv{width:100%;border-radius:6px;margin:8px 0;background:#111;display:none}
.pv video{width:100%;display:block;border-radius:6px}
.rc{background:#111;border-radius:10px;padding:12px;margin:8px 0;border:1px solid #22c55e}
.qt{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:4px}
.opt{padding:8px 10px;background:#0a0a0a;border-radius:6px;font-size:13px;border:1px solid transparent}
.opt.c{background:rgba(34,197,94,.12);border-color:#22c55e;color:#22c55e;font-weight:600}
.opt.c::before{content:'✓ '}
.mt{display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid #222;font-size:11px;color:#666}
.cf{color:#38bdf8}
</style>
</head>
<body>
<div class="hdr">
<h1>⚡ MentiAI</h1>
<div class="tg">Auto<div class="t" id="at" onclick="ta()"></div></div>
</div>
<div class="sb"><div><span class="sd off" id="sd"></span><span id="st">Not connected</span></div><div id="lt"></div></div>
<div class="er" id="eb"></div>
<div class="pv" id="pv"><video id="vd" playsinline muted></video></div>
<button class="btn b1" id="mb" onclick="hb()">Start Capture</button>
<div id="up" style="display:none"><input type="file" accept="image/*" id="fi" onchange="fu(event)" style="display:none"><button class="btn b2" onclick="document.getElementById('fi').click()">Upload Screenshot</button></div>
<div id="ra"></div>

<script>
const W='https://nik-de46.nikhilbanta.workers.dev';
const P='Extract quiz question and options from this screenshot. Return JSON only:{"d":true,"q":"question","o":["A: ...","B: ...","C: ...","D: ..."],"a":"A","c":0.95,"r":"why"} or {"d":false}';
let s=null,v=null,c,x,cap=false,auto=false,ai=null,ms=4000,proc=false;
const hasGC=navigator.mediaDevices&&navigator.mediaDevices.getDisplayMedia;

function ss(t,e){document.getElementById('sd').className='sd '+t;document.getElementById('st').textContent=e}
function se(m){const b=document.getElementById('eb');b.textContent=m;b.style.display='block';setTimeout(()=>b.style.display='none',4000)}

function init(){
if(hasGC){
document.getElementById('mb').style.display='block';
document.getElementById('up').style.display='none';
}else{
document.getElementById('mb').style.display='none';
document.getElementById('up').style.display='block';
}}

async function hb(){if(!hasGC){document.getElementById('fi').click();return}cap?ca():sc()}

async function fu(e){
const f=e.target.files[0];if(!f)return;
ss('w','Processing...');
const img=new Image();
img.onload=async()=>{
const cv=document.createElement('canvas');
const maxW=800,maxH=600;
let w=img.width,h=img.height;
if(w>maxW){h=h*maxW/w;w=maxW}
if(h>maxH){w=w*maxH/h;h=maxH}
cv.width=w;cv.height=h;
cv.getContext('2d').drawImage(img,0,0,w,h);
const data=cv.toDataURL('image/jpeg',0.5);
ss('w','Analyzing...');
document.getElementById('ra').innerHTML='<div class="ld"><div class="sp"></div>Analyzing screenshot...</div>';
try{const r=await cg(data);if(r&&r.d)dr(r);else document.getElementById('ra').innerHTML='<div style="padding:12px;color:#666;font-size:13px">No question detected</div>';
document.getElementById('lt').textContent=new Date().toLocaleTimeString();
}catch(er){se('Error: '+er.message);ss('on','Ready')}
};
img.src=URL.createObjectURL(f);
e.target.value='';
}

async function sc(){
try{ss('w','Requesting screen...');
const opts={video:{width:{ideal:1280},height:{ideal:720}},audio:false};
if(navigator.userAgent.includes('Chrome'))opts.video.displaySurface='browser';
s=await navigator.mediaDevices.getDisplayMedia(opts);
v=document.getElementById('vd');v.srcObject=s;await v.play();
c=document.createElement('canvas');c.width=v.videoWidth||1280;c.height=v.videoHeight||720;x=c.getContext('2d');
cap=true;
const b=document.getElementById('mb');b.textContent='Capture Now';b.className='btn b2';
document.getElementById('pv').style.display='block';
document.getElementById('ra').innerHTML='';
ss('on','Ready');
s.getVideoTracks()[0].onended=()=>{cap=false;auto=false;document.getElementById('at').classList.remove('on');document.getElementById('pv').style.display='none';document.getElementById('mb').textContent='Start Capture';document.getElementById('mb').className='btn b1';ss('off','Stopped');se('Screen sharing ended')};
}catch(e){ss('off','Not connected');se(e.name==='NotAllowedError'?'Permission denied':e.name==='NotSupportedError'?'Not supported. Use Chrome/Edge.':e.message)}}

function cf(){if(!v||!v.videoWidth)return null;c.width=v.videoWidth;c.height=v.videoHeight;x.drawImage(v,0,0);return c.toDataURL('image/jpeg',0.5)}

async function ca(){
if(proc)return;proc=true;
const b=document.getElementById('mb');
if(!auto){b.textContent='...';b.disabled=true}
try{const img=cf();if(!img){se('No frame');return}
ss('w','Analyzing...');
document.getElementById('ra').innerHTML='<div class="ld"><div class="sp"></div>Analyzing screenshot...</div>';
const r=await cg(img);
if(r&&r.d)dr(r);else if(!auto)document.getElementById('ra').innerHTML='<div style="padding:12px;color:#666;font-size:13px">No question detected</div>';
document.getElementById('lt').textContent=new Date().toLocaleTimeString();
}catch(e){se('Error: '+e.message);ss('on','Ready')}
finally{proc=false;if(!auto){b.textContent='Capture Now';b.disabled=false}}}

async function ck(img){
const d=img.split(',')[1];
const ab=new AbortController();const to=setTimeout(()=>ab.abort(),12000);
try{const r=await fetch(W,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:P},{inlineData:{mimeType:'image/jpeg',data:d}}]}],generationConfig:{responseMimeType:'application/json',temperature:0.1}}),signal:ab.signal});
clearTimeout(to);if(!r.ok)throw new Error('HTTP '+r.status);
const j=await r.json();if(j.error)throw new Error(j.error.message);
const t=j.candidates?.[0]?.content?.parts?.[0]?.text;if(!t)throw new Error('Empty');
return JSON.parse(t)}catch(e){clearTimeout(to);throw e}}

async function cg(img){return ck(img)}

function dr(r){
const a=document.getElementById('ra');
const ci=r.a?.toUpperCase().charCodeAt(0)-65;
const cp=Math.round((r.c||0)*100);
let h='';
if(r.o&&r.o.length)r.o.forEach((o,i)=>{h+=`<div class="opt${i===ci?' c':''}">${o}</div>`});
a.innerHTML=`<div class="rc"><div class="qt">${esc(r.q||'Unknown')}</div><div class="opts">${h}</div><div class="mt"><span class="cf">${cp}%</span><span>${new Date().toLocaleTimeString()}</span></div></div>`}

function ta(){auto=!auto;document.getElementById('at').classList.toggle('on',auto);auto?sa():clearInterval(ai)}
function sa(){clearInterval(ai);ai=setInterval(()=>{if(cap&&!proc)ca()},ms);ca()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
